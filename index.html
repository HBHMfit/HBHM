function getLocalDate(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getGrade(score){
  if(score>=90)return'A';
  if(score>=80)return'B';
  if(score>=70)return'C';
  if(score>=60)return'D';
  return'F';
}

function gradeColor(score){
  if(score>=80)return C.success;
  if(score>=60)return C.warning;
  return C.danger;
}

function AuthScreen({setScreen,setUser}){
  const [mode,setMode]=useState('signup');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [name,setName]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const inp={width:'100%',padding:'14px 16px',borderRadius:12,fontSize:15,background:C.navyLight,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none',boxSizing:'border-box'};

  const handle=async()=>{
    setError('');setLoading(true);
    try{
      if(mode==='signup'){
        const{data,error:err}=await sb.auth.signUp({email,password,options:{data:{full_name:name}}});
        if(err)throw err;
        if(data.user){
          await sb.from('profiles').upsert({id:data.user.id,full_name:name,email,phase:1,tier:1,streak:0,points:0,created_at:new Date().toISOString()});
          setUser(data.user);
          setScreen(S.WELCOME);
        }
      } else {
        const{data,error:err}=await sb.auth.signInWithPassword({email,password});
        if(err)throw err;
        setUser(data.user);
        setScreen(S.DASH);
      }
    }catch(err){setError(err.message);}
    setLoading(false);
  };

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'60px 24px 40px'}},
    h('div',{style:{textAlign:'center',marginBottom:32}},
      h('div',{style:{display:'flex',justifyContent:'center',marginBottom:16}},h(Logo,{size:70})),
      h('div',{style:{fontSize:42,fontWeight:900,letterSpacing:6,color:C.silverBright}},'HBHM'),
      h('div',{style:{fontSize:11,letterSpacing:3,color:C.silverDim,marginTop:4}},'HEALTHY BODY HEALTHY MIND')
    ),
    h('div',{style:{display:'flex',background:C.navyLight,borderRadius:12,padding:4,marginBottom:24}},
      ['signup','signin'].map(m=>h('button',{key:m,onClick:()=>setMode(m),className:'btn',style:{flex:1,padding:'10px 0',borderRadius:10,background:mode===m?C.blue:'transparent',color:mode===m?'#fff':C.silverDim,fontSize:14,fontWeight:700}},m==='signup'?'Sign Up':'Sign In'))
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      mode==='signup'&&h('div',null,
        h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'YOUR NAME'),
        h('input',{style:inp,placeholder:'First name',value:name,onChange:e=>setName(e.target.value)})
      ),
      h('div',null,
        h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'EMAIL'),
        h('input',{style:inp,placeholder:'your@email.com',value:email,onChange:e=>setEmail(e.target.value),type:'email'})
      ),
      h('div',null,
        h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'PASSWORD'),
        h('input',{style:inp,placeholder:'Min. 6 characters',value:password,onChange:e=>setPassword(e.target.value),type:'password'})
      )
    ),
    error&&h('div',{style:{background:'#EF444415',border:'1px solid #EF444440',borderRadius:10,padding:12,marginTop:16,fontSize:13,color:C.danger}},error),
    h('button',{onClick:handle,disabled:loading,className:'btn',style:{width:'100%',marginTop:24,padding:'16px 0',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:14,color:'#fff',fontSize:15,fontWeight:800,opacity:loading?0.7:1}},
      loading?'Please wait...':(mode==='signup'?'CREATE ACCOUNT':'SIGN IN')
    ),
    h('div',{style:{textAlign:'center',marginTop:12,fontSize:12,color:C.silverDim}},'$5/week - You only get one body')
  );
}

  const equipOpts=[

  ];

  const toggleGoal=g=>setData(d=>({...d,goals:d.goals.includes(g)?d.goals.filter(x=>x!==g):[...d.goals,g]}));
  const togglePain=p=>setData(d=>({...d,pain:d.pain.includes(p)?d.pain.filter(x=>x!==p):[...d.pain,p]}));

  const finish=async()=>{
    await sb.from('profiles').update({
      phase:1,tier:1,
      pain_areas:data.pain,
      equipment:data.equipment,
      goal:data.goals.join(', '),
      age:parseInt(data.age)||null,
      height:data.height,
      weight:data.weight
    }).eq('id',user.id);
    setProfile(p=>({...p,phase:1,tier:1}));
    setScreen(S.PAYMENT);
  };

  const next=()=>step<STEPS-1?setStep(s=>s+1):finish();
  const back=()=>step>0&&setStep(s=>s-1);
  const canNext=()=>{
    if(step===0)return data.fitness!=='';
    if(step===1)return data.goals.length>0;
    if(step===3)return data.equipment!=='';
    if(step===4)return data.budget!=='';
    return true;

    sub&&h('div',{style:{fontSize:12,color:C.silverDim,marginTop:2}},sub)
  );

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 40px'}},
    h('div',{style:{height:4,background:C.border,borderRadius:2,marginBottom:24,overflow:'hidden'}},
      h('div',{style:{height:'100%',borderRadius:2,background:C.blue,width:pct+'%',transition:'width 0.3s'}})
    ),
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:20}},'ASSESSMENT - STEP '+(step+1)+' OF '+STEPS),

    step===0&&h('div',null,
      h('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:24}},
        h(Avatar,{size:48}),
        h('div',null,
          h('div',{style:{fontSize:22,fontWeight:800,color:C.silverBright}},'Where are you right now?'),
          h('div',{style:{fontSize:13,color:C.silverDim,marginTop:4}},'Be honest. Coach Skelly will know.')
        )
      ),
      fitnessOpts.map(o=>selBtn(data.fitness===o.id,()=>setData(d=>({...d,fitness:o.id})),o.label,o.sub))
    ),

    step===1&&h('div',null,
      h('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:24}},
        h(Avatar,{size:48}),
        h('div',null,
          h('div',{style:{fontSize:22,fontWeight:800,color:C.silverBright}},'What are your goals?'),

      )
    ),

    step===2&&h('div',null,

        )

      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}},
        painOpts.map(p=>h('button',{key:p,onClick:()=>togglePain(p),className:'btn',style:{padding:'12px',borderRadius:12,textAlign:'left',background:data.pain.includes(p)?'#EF444415':C.navyLight,border:'1.5px solid '+(data.pain.includes(p)?C.danger:C.border),display:'flex',alignItems:'center',gap:8}},
          h('div',{style:{width:10,height:10,borderRadius:'50%',flexShrink:0,background:data.pain.includes(p)?C.danger:C.border}}),
          h('span',{style:{fontSize:13,fontWeight:700,color:data.pain.includes(p)?C.silverBright:C.silver}},p)
        ))
      )
    ),

    step===3&&h('div',null,
      h('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:24}},
        h(Avatar,{size:48}),
        h('div',null,
          h('div',{style:{fontSize:22,fontWeight:800,color:C.silverBright}},'What equipment do you have?'),
          h('div',{style:{fontSize:13,color:C.silverDim,marginTop:4}},"We'll build your program around this.")
        )
      ),

    ),

    step===4&&h('div',null,
      h('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:24}},

          h('div',{style:{fontSize:22,fontWeight:800,color:C.silverBright}},'Your body stats'),
          h('div',{style:{fontSize:13,color:C.silverDim,marginTop:4}},'Personalizes your calorie targets.')
        )

      h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'AGE'),
      h('input',{style:inp,placeholder:'e.g. 28',value:data.age,onChange:e=>setData(d=>({...d,age:e.target.value})),type:'number'}),
      h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'HEIGHT'),
      h('input',{style:inp,placeholder:"e.g. 5'10 or 178cm",value:data.height,onChange:e=>setData(d=>({...d,height:e.target.value}))}),
      h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'WEIGHT (lbs)'),
      h('input',{style:inp,placeholder:'e.g. 185',value:data.weight,onChange:e=>setData(d=>({...d,weight:e.target.value})),type:'number'})

    h('div',{style:{display:'flex',gap:12,marginTop:28}},
      step>0&&h('button',{onClick:back,className:'btn',style:{padding:'16px 20px',background:C.navyLight,borderRadius:14,color:C.silverDim,fontSize:15,fontWeight:700}},'Back'),

function DashScreen({setScreen,user,profile,setProfile}){
  const tier=profile?.tier||1;
  const NONNEG=NONNEG_TIERS[tier]||NONNEG_TIERS[1];
  const [checked,setChecked]=useState({});
  const [saving,setSaving]=useState(false);
  const [today,setToday]=useState(getLocalDate());

  useEffect(()=>{
    const id=setInterval(()=>{
      const nowDate=getLocalDate();
      if(nowDate!==today){
        setToday(nowDate);
        setChecked({});
      }
    },30000);
    return ()=>clearInterval(id);
  },[today]);

  useEffect(()=>{
    if(!user)return;
    sb.from('daily_logs').select('nonneg_completed').eq('user_id',user.id).eq('date',today).maybeSingle().then(({data})=>{
      setChecked(data?.nonneg_completed||{});
    });
    applyDailyPenalties();
  },[user,today]);

  const applyDailyPenalties=async()=>{
    const y=new Date();y.setDate(y.getDate()-1);
    const yDate=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
    const{data:yLog}=await sb.from('daily_logs').select('id,nonneg_completed,penalty_applied,workout_picks,workout_picks_completed,workout_penalty_applied,meals,nutrition_penalty_applied').eq('user_id',user.id).eq('date',yDate).maybeSingle();

    let totalPenalty=0;
    const updates={};

    if(!(yLog&&yLog.penalty_applied)){
      const doneY=yLog?.nonneg_completed?Object.values(yLog.nonneg_completed).filter(Boolean).length:0;
      const missed=NONNEG.length-doneY;
      if(missed>0)totalPenalty+=missed*5;
      updates.penalty_applied=true;
    }

    if(!(yLog&&yLog.workout_penalty_applied)){
      const picks=yLog?.workout_picks||[];
      const completedMap=yLog?.workout_picks_completed||{};
      const missedWorkouts=picks.filter(name=>!completedMap[name]).length;
      if(missedWorkouts>0)totalPenalty+=missedWorkouts*5;
      updates.workout_penalty_applied=true;
    }

    if(!(yLog&&yLog.nutrition_penalty_applied)){
      const hadMeals=yLog?.meals&&yLog.meals.length>0;
      if(!hadMeals)totalPenalty+=5;
      updates.nutrition_penalty_applied=true;
    }

    if(totalPenalty>0){
      const{data:freshProfile}=await sb.from('profiles').select('points').eq('id',user.id).maybeSingle();
      const basePoints=freshProfile?.points??(profile?.points||0);
      const np=Math.max(0,basePoints-totalPenalty);
      await sb.from('profiles').update({points:np}).eq('id',user.id);
      setProfile(p=>({...p,points:np}));
    }

    if(Object.keys(updates).length>0){
      if(yLog){
        await sb.from('daily_logs').update(updates).eq('id',yLog.id);
      }else{
        await sb.from('daily_logs').insert({user_id:user.id,date:yDate,nonneg_completed:{},...updates});
      }
    }
  };

  const toggle=async(id)=>{
    const wasChecked=!!checked[id];
    const newChecked={...checked,[id]:!wasChecked};
    setChecked(newChecked);setSaving(true);
    const doneBefore=Object.values(checked).filter(Boolean).length;
    const doneAfter=Object.values(newChecked).filter(Boolean).length;
    const allBefore=doneBefore===NONNEG.length;
    const allAfter=doneAfter===NONNEG.length;
    let pointsDelta=wasChecked?-5:5;
    if(!allBefore&&allAfter)pointsDelta+=20;
    if(allBefore&&!allAfter)pointsDelta-=20;
    const{data:existing}=await sb.from('daily_logs').select('id').eq('user_id',user.id).eq('date',today).maybeSingle();
    if(existing){
      await sb.from('daily_logs').update({nonneg_completed:newChecked}).eq('id',existing.id);
    }else{
      await sb.from('daily_logs').insert({user_id:user.id,date:today,nonneg_completed:newChecked});
    }
    const{data:freshProfile}=await sb.from('profiles').select('points,streak').eq('id',user.id).maybeSingle();
    const basePoints=freshProfile?.points??(profile?.points||0);
    const baseStreak=freshProfile?.streak??(profile?.streak||0);
    const np=Math.max(0,basePoints+pointsDelta);
    let ns=baseStreak;
    if(!allBefore&&allAfter)ns=ns+1;
    if(allBefore&&!allAfter)ns=Math.max(0,ns-1);
    await sb.from('profiles').update({points:np,streak:ns,last_active:today}).eq('id',user.id);
    setProfile(p=>({...p,points:np,streak:ns}));
    setSaving(false);
  };

  const done=Object.values(checked).filter(Boolean).length;
  const all=done===NONNEG.length;
  const first=profile?.full_name?.split(' ')[0]?.toUpperCase()||'ATHLETE';

  return h('div',{style:{minHeight:'100vh',background:C.navy,paddingBottom:100}},
    h('div',{style:{padding:'54px 24px 20px',background:'linear-gradient(180deg,#141B26,#0D1117)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        h('div',null,
          h('div',{style:{fontSize:13,color:C.silverDim,fontWeight:600}},'Good morning,'),
          h('div',{style:{fontSize:28,fontWeight:900,color:C.silverBright,letterSpacing:1}},first),
          h('div',{style:{marginTop:6}},
            h('span',{style:{fontSize:10,fontWeight:700,letterSpacing:1.5,color:C.success,background:'#22C55E20',padding:'3px 10px',borderRadius:20,border:'1px solid #22C55E40'}},'PHASE 1 - RESTORE')
          )
        ),
        h('button',{onClick:()=>setScreen(S.PROFILE),className:'btn',style:{position:'relative',background:'none',padding:0}},
          profile?.avatar_url?h('img',{src:profile.avatar_url,style:{width:64,height:64,borderRadius:'50%',objectFit:'cover',border:'1.5px solid #2A3447'}}):h(Avatar,{size:64}),
          h('div',{style:{position:'absolute',bottom:-4,right:-4,background:all?C.success:C.warning,borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:800,border:'2px solid #0D1117'}},all?'✓':done),
          profile?.body_score&&h('div',{style:{position:'absolute',top:-6,left:-6,background:gradeColor(profile.body_score),borderRadius:8,padding:'2px 6px',fontSize:10,fontWeight:900,color:'#fff',border:'2px solid #0D1117'}},getGrade(profile.body_score))
        )
      )
    ),
    h('div',{style:{padding:'0 24px'}},
      h('div',{style:{display:'flex',gap:12,marginBottom:20}},
        h('div',{style:{flex:1,background:'#3B82F610',border:'1px solid #3B82F630',borderRadius:16,padding:'14px 16px'}},
          h('div',{style:{fontSize:32}},'🔥'),
          h('div',{style:{fontSize:24,fontWeight:900,color:C.white}},profile?.streak||0),
          h('div',{style:{fontSize:11,color:C.silverDim}},'day streak')
        ),
        h('div',{style:{flex:1,background:'#F59E0B10',border:'1px solid #F59E0B30',borderRadius:16,padding:'14px 16px'}},
          h('div',{style:{fontSize:32}},'🏆'),
          h('div',{style:{fontSize:18,fontWeight:900,color:C.white}},profile?.points||0),
          h('div',{style:{fontSize:11,color:C.silverDim}},'points')
        ),
        h('div',{style:{flex:1,background:'#22C55E10',border:'1px solid #22C55E30',borderRadius:16,padding:'14px 16px'}},
          h('div',{style:{fontSize:32}},'📊'),
          h('div',{style:{fontSize:14,fontWeight:800,color:C.success}},'Tier '+tier),
          h('div',{style:{fontSize:11,color:C.silverDim}},'Phase 1')
        )
      ),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('div',{style:{fontSize:12,color:C.silverDim,fontWeight:700,letterSpacing:1.5}},'DAILY NON-NEGOTIABLES'),
        h('div',{style:{fontSize:11,fontWeight:700,color:all?C.success:C.silver}},saving?'saving...':done+'/'+NONNEG.length)
      ),
      h('div',{style:{height:4,background:C.border,borderRadius:2,marginBottom:16,overflow:'hidden'}},
        h('div',{style:{height:'100%',borderRadius:2,background:all?C.success:C.blue,width:((done/NONNEG.length)*100)+'%',transition:'width 0.3s'}})
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:20}},
        NONNEG.map(item=>{
          const d=!!checked[item.id];
          return h('button',{key:item.id,onClick:()=>toggle(item.id),className:'btn',style:{background:d?'#22C55E12':C.navyLight,border:'1.5px solid '+(d?'#22C55E60':C.border),borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left',width:'100%'}},
            h('div',{style:{width:28,height:28,borderRadius:'50%',flexShrink:0,background:d?C.success:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:800}},d?'✓':''),
            h('div',{style:{flex:1}},h('span',{style:{fontSize:14,fontWeight:700,color:d?C.silverDim:C.silverBright,textDecoration:d?'line-through':'none'}},item.label)),
            h('div',{style:{fontSize:13,fontWeight:800,color:d?C.success:C.silver}},item.target,' ',h('span',{style:{fontSize:10,color:C.silverDim}},item.unit||'reps'))
          );
        })
      ),
      all&&h('div',{style:{background:'#22C55E15',border:'1px solid #22C55E40',borderRadius:14,padding:'14px 16px',marginBottom:20,display:'flex',gap:12,alignItems:'center'}},
        h('div',{style:{fontSize:28}},'💪'),
        h('div',null,
          h('div',{style:{fontSize:13,fontWeight:800,color:C.success}},'Non-negotiables done!'),
          h('div',{style:{fontSize:12,color:C.silverDim}},'Coach Skelly approves. Now hit your workout.')
        )
      ),
      h('div',{style:{background:C.navyLight,borderRadius:16,padding:16,border:'1px solid #2A3447',display:'flex',gap:12}},
        h(Avatar,{size:40}),
        h('div',null,
          h('div',{style:{fontSize:12,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:4}},'COACH SKELLY'),
          h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},all?'Non-negotiables done. Discipline. Now hit your workout.':(NONNEG.length-done)+' non-negotiables left. No excuses.'),
          h('div',{style:{display:'flex',gap:8,marginTop:10}},
            h('button',{onClick:()=>setScreen(S.WORKOUT),className:'btn',style:{background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:8,padding:'7px 14px',color:'#fff',fontSize:12,fontWeight:700}},'WORKOUT'),
            h('button',{onClick:()=>setScreen(S.COACH),className:'btn',style:{background:'none',border:'1px solid #3B82F6',borderRadius:8,padding:'7px 14px',color:C.blue,fontSize:12,fontWeight:700}},'COACH')
          )
        )
      )
    ),
    h(BottomNav,{screen:S.DASH,setScreen})
  );
}

  const types=['All','Stretch','Pilates','Conditioning','Strength'];
  const colors={Stretch:C.success,Pilates:'#A855F7',Flexibility:'#06B6D4',Conditioning:C.warning,Strength:C.blue};
  const icons={Stretch:'🤸',Pilates:'🧘',Flexibility:'🌊',Conditioning:'⚡',Strength:'💪'};
  const PHASE1_TYPES=['Stretch','Pilates','Conditioning'];
  const phase1Workouts=workouts.filter(w=>PHASE1_TYPES.includes(w.type));
  const filtered=filter==='All'?phase1Workouts:phase1Workouts.filter(w=>w.type===filter);

  const DAY_KEYS=['mon','tue','wed','thu','fri','sat','sun'];
  const DAY_LABELS={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};

  const getMonday=()=>{
    const d=new Date();
    const day=d.getDay();
    const diff=day===0?-6:1-day;
    const monday=new Date(d);
    monday.setDate(d.getDate()+diff);
    return monday.getFullYear()+'-'+String(monday.getMonth()+1).padStart(2,'0')+'-'+String(monday.getDate()).padStart(2,'0');
  };
  const thisMonday=getMonday();
  const todayKey=DAY_KEYS[(new Date().getDay()+6)%7];

  const hasPlan=profile?.weekly_plan_week_start===thisMonday&&profile?.weekly_plan;
  const weekPlan=hasPlan?profile.weekly_plan:null;

  useEffect(()=>{
    setSelectedDay(todayKey);
  },[]);

  useEffect(()=>{
    if(!user||!hasPlan)return;
    const today=getLocalDate();
    const todayPicks=(weekPlan[todayKey]?.picks)||[];
    sb.from('daily_logs').select('id,workout_picks,workout_picks_completed').eq('user_id',user.id).eq('date',today).maybeSingle().then(({data})=>{
      if(data){
        if(!data.workout_picks||data.workout_picks.length===0){
          sb.from('daily_logs').update({workout_picks:todayPicks}).eq('id',data.id);
        }
        setTodayCompleted(data.workout_picks_completed||{});
      }else{
        sb.from('daily_logs').insert({user_id:user.id,date:today,workout_picks:todayPicks,workout_picks_completed:{}});
        setTodayCompleted({});
      }
    });
  },[user,hasPlan]);

  const buildWeek=async()=>{
    setLoadingPlan(true);
    const list=phase1Workouts.map(w=>w.name+' ('+w.type+')').join(', ');
    const painAreas=(profile?.pain_areas||[]).join(', ')||'none listed';
    const msg='Build a 7-day workout plan (Monday through Sunday) using ONLY exercises from this list: '+list+
      '. Each day needs exactly 10 exercises: 3 Stretch, 4 Pilates, 3 Conditioning. You may reuse exercises across different days.'+
      ' My known pain areas: '+painAreas+
      '. What I want to prioritize this week: '+(priority||'not specified')+
      '. Any current pain or injuries: '+(painToday||'none')+
      '. Respond with ONLY JSON, no other text, in this exact shape: {"mon":{"picks":["Exact Name",...],"reason":"short sentence"},"tue":{...},"wed":{...},"thu":{...},"fri":{...},"sat":{...},"sun":{...}}';
    try{
      const res=await fetch(SB_URL+'/functions/v1/Coach-Skelly',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_ANON,'apikey':SB_ANON},
        body:JSON.stringify({message:msg})
      });
      const data=await res.json();
      const text=(data.reply||'{}').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(text);
      await sb.from('profiles').update({weekly_plan:parsed,weekly_plan_week_start:thisMonday}).eq('id',user.id);
      setProfile(p=>({...p,weekly_plan:parsed,weekly_plan_week_start:thisMonday}));
      setBuildingWeek(false);
    }catch(e){
      alert("Couldn't build your week. Try again.");
    }
    setLoadingPlan(false);
  };

  const toggleTodayComplete=async(name)=>{
    const wasDone=!!todayCompleted[name];
    const newCompleted={...todayCompleted,[name]:!wasDone};
    setTodayCompleted(newCompleted);
    const today=getLocalDate();
    const{data:existing}=await sb.from('daily_logs').select('id').eq('user_id',user.id).eq('date',today).maybeSingle();
    if(existing)await sb.from('daily_logs').update({workout_picks_completed:newCompleted}).eq('id',existing.id);
    if(user){
      const delta=wasDone?-5:5;
      const{data:freshProfile}=await sb.from('profiles').select('points').eq('id',user.id).maybeSingle();
      const basePoints=freshProfile?.points??(profile?.points||0);
      const np=Math.max(0,basePoints+delta);
      await sb.from('profiles').update({points:np}).eq('id',user.id);
      setProfile(p=>({...p,points:np}));
    }
  };

  const selectedPlan=hasPlan&&selectedDay?weekPlan[selectedDay]:null;
  const isToday=selectedDay===todayKey;

  return h('div',{style:{minHeight:'100vh',background:C.navy,paddingBottom:100}},
    h('div',{style:{padding:'54px 24px 16px',background:'linear-gradient(180deg,#141B26,#0D1117)'}},
      h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:4}},'PHASE 1'),
      h('div',{style:{fontSize:26,fontWeight:900,color:C.silverBright}},'Your Week'),
      h('div',{style:{fontSize:13,color:C.silverDim,marginTop:4}},hasPlan?'Plan set for this week':'No plan yet for this week')
    ),
    h('div',{style:{padding:'16px 24px 0'}},
      !hasPlan&&!buildingWeek&&h('button',{onClick:()=>setBuildingWeek(true),className:'btn',style:{width:'100%',padding:'16px',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:14,color:'#fff',fontSize:14,fontWeight:800}},'💀 ASK SKELLY TO BUILD MY WEEK'),
      buildingWeek&&h('div',{style:{background:C.navyLight,borderRadius:14,padding:16,border:'1px solid #3B82F640',marginBottom:14}},
        h('div',{style:{fontSize:12,color:C.blue,fontWeight:700,marginBottom:10}},'COACH SKELLY WANTS TO KNOW'),
        h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600}},'WHAT DO YOU WANT TO PRIORITIZE THIS WEEK?'),
        h('input',{value:priority,onChange:e=>setPriority(e.target.value),placeholder:'e.g. loosening my hips',style:{width:'100%',padding:'12px 14px',borderRadius:10,fontSize:14,background:C.navy,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none',boxSizing:'border-box',marginBottom:10}}),
        h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600}},'ANY CURRENT PAIN OR INJURIES?'),
        h('input',{value:painToday,onChange:e=>setPainToday(e.target.value),placeholder:'e.g. tight lower back',style:{width:'100%',padding:'12px 14px',borderRadius:10,fontSize:14,background:C.navy,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none',boxSizing:'border-box',marginBottom:12}}),
        h('div',{style:{display:'flex',gap:10}},
          h('button',{onClick:buildWeek,disabled:loadingPlan,className:'btn',style:{flex:1,padding:'12px 0',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:10,color:'#fff',fontSize:14,fontWeight:700,opacity:loadingPlan?0.7:1}},loadingPlan?'Building your week...':'BUILD MY WEEK'),
          h('button',{onClick:()=>setBuildingWeek(false),className:'btn',style:{padding:'12px 16px',background:C.border,borderRadius:10,color:C.silverDim,fontSize:14}},'Cancel')
        )
      ),
      hasPlan&&h('div',{style:{display:'flex',gap:6,marginBottom:14,overflowX:'auto'}},
        DAY_KEYS.map(dk=>h('button',{key:dk,onClick:()=>setSelectedDay(dk),className:'btn',style:{padding:'10px 14px',borderRadius:12,fontSize:12,fontWeight:800,flexShrink:0,background:selectedDay===dk?'linear-gradient(135deg,#1D4ED8,#3B82F6)':C.navyLight,color:selectedDay===dk?'#fff':(dk===todayKey?C.blue:C.silverDim),border:'1px solid '+(dk===todayKey?C.blue:'#2A3447')}},DAY_LABELS[dk]+(dk===todayKey?' •':''))
        )
      ),
      hasPlan&&selectedPlan&&h('div',{style:{background:'#3B82F610',border:'1px solid #3B82F630',borderRadius:14,padding:16,marginBottom:16}},
        h('div',{style:{display:'flex',gap:10,marginBottom:10}},
          h(Avatar,{size:32}),
          h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.5,flex:1}},selectedPlan.reason||'')
        ),
        isToday&&selectedPlan.picks?.length>0&&h('div',{style:{fontSize:11,color:C.silverDim,fontWeight:700,marginBottom:8}},Object.values(todayCompleted).filter(Boolean).length+' / '+selectedPlan.picks.length+' done today'),
        !isToday&&h('div',{style:{fontSize:11,color:C.silverDim,fontWeight:700,marginBottom:8}},'Preview - unlocks on its day'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          (selectedPlan.picks||[]).map(name=>{
            const w=workouts.find(x=>x.name===name);
            if(!w)return null;
            const done=isToday&&!!todayCompleted[name];
            return h('div',{key:name,style:{background:done?'#22C55E12':C.navyLight,borderRadius:12,padding:'10px 14px',border:'1px solid '+(done?'#22C55E60':'#2A3447'),display:'flex',alignItems:'center',gap:10,width:'100%'}},
              isToday&&h('button',{onClick:()=>toggleTodayComplete(name),className:'btn',style:{width:26,height:26,borderRadius:'50%',flexShrink:0,background:done?C.success:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:800}},done?'✓':''),
              h('button',{onClick:()=>{setEx(w);setScreen(S.EXERCISE);},className:'btn',style:{flex:1,background:'transparent',display:'flex',alignItems:'center',gap:10,textAlign:'left',padding:0}},
                h('span',{style:{fontSize:16}},icons[w.type]||'💪'),
                h('div',{style:{flex:1,fontSize:13,fontWeight:700,color:done?C.silverDim:C.silverBright,textDecoration:done?'line-through':'none'}},w.name),
                h('span',{style:{fontSize:10,fontWeight:700,color:colors[w.type]||C.blue}},w.type)
              )
            );
          })
        ),
        isToday&&h('button',{onClick:()=>setBuildingWeek(true),className:'btn',style:{width:'100%',marginTop:10,padding:'10px 0',background:'transparent',border:'1px solid #2A3447',borderRadius:10,color:C.silverDim,fontSize:12}},'Rebuild this week')
      )
    ),
    h('div',{style:{padding:'16px 24px 8px',overflowX:'auto'}},
      h('div',{style:{display:'flex',gap:8,paddingBottom:4}},
        types.map(t=>h('button',{key:t,onClick:()=>setFilter(t),className:'btn',style:{padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,background:filter===t?(colors[t]||C.blue):C.navyLight,color:filter===t?'#fff':C.silverDim,border:'1px solid '+(filter===t?(colors[t]||C.blue):C.border)}},t))
      )
    ),
    h('div',{style:{padding:'0 24px'}},
      h('div',{style:{fontSize:12,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:10}},'FULL LIBRARY'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        filtered.map(w=>h('button',{key:w.id,onClick:()=>{setEx(w);setScreen(S.EXERCISE);},className:'btn',style:{background:C.navyLight,borderRadius:14,padding:'14px 16px',border:'1px solid #2A3447',textAlign:'left',display:'flex',alignItems:'center',gap:14,width:'100%'}},
          h('div',{style:{width:44,height:44,borderRadius:12,flexShrink:0,background:(colors[w.type]||C.blue)+'20',border:'1px solid '+(colors[w.type]||C.blue)+'40',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}},icons[w.type]||'💪'),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:14,fontWeight:700,color:C.silverBright}},w.name),
            h('div',{style:{fontSize:11,color:C.silverDim,marginTop:2}},w.sets+' - '+w.duration)
          ),
          h('span',{style:{fontSize:10,fontWeight:700,color:colors[w.type]||C.blue,background:(colors[w.type]||C.blue)+'20',padding:'2px 8px',borderRadius:10,whiteSpace:'nowrap'}},w.type)
        ))
      )
    ),
    h(BottomNav,{screen:S.WORKOUT,setScreen})
  );
}

      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:4}},'COACH SKELLY'),
        h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},
          started?"You're doing it. Keep your form tight - "+exercise.tip:"Alright, let's go. "+exercise.tip+" Hit start when you're ready."

      )

    h('div',{style:{fontSize:13,color:C.silverDim,marginBottom:20}},exercise.sets),
    h('div',{style:{background:C.navyLight,borderRadius:16,padding:18,border:'1px solid #2A3447',marginBottom:12}},
      h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:1.5,marginBottom:14}},'MUSCLES WORKED'),
      h('div',{style:{marginBottom:12}},
        h('div',{style:{fontSize:11,color:C.success,fontWeight:700,letterSpacing:1,marginBottom:8}},'PRIMARY'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          (exercise.primary||[]).map(x=>h('span',{key:x,style:{background:'#22C55E15',border:'1px solid #22C55E40',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600,color:C.success}},x))
        )
      ),
      h('div',null,
        h('div',{style:{fontSize:11,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:8}},'SECONDARY'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          (exercise.secondary||[]).map(x=>h('span',{key:x,style:{background:C.border,borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600,color:C.silverDim}},x))
        )
      )
    ),
    h('div',{style:{background:'#F59E0B10',border:'1px solid #F59E0B30',borderRadius:14,padding:16,marginBottom:12,display:'flex',gap:12}},
      h('span',{style:{fontSize:20}},'💡'),
      h('div',null,
        h('div',{style:{fontSize:11,color:C.warning,fontWeight:700,letterSpacing:1,marginBottom:4}},'FORM TIP'),
        h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},exercise.tip)
      )
    ),
    exercise.why&&h('div',{style:{background:'#3B82F610',border:'1px solid #3B82F630',borderRadius:14,padding:16,marginBottom:16,display:'flex',gap:12}},
      h('span',{style:{fontSize:20}},'🎯'),
      h('div',null,
        h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:4}},'WHY THIS EXERCISE'),
        h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},exercise.why)
      )
    ),
    h('div',{style:{display:'flex',gap:12,marginBottom:16}},
      h('div',{style:{flex:1,background:C.navyLight,borderRadius:14,padding:16,textAlign:'center',border:'1px solid #2A3447'}},
        h('div',{style:{fontSize:28,fontWeight:900,color:C.white}},mm+':'+ss),
        h('div',{style:{fontSize:11,color:C.silverDim,marginTop:4}},'TIMER')
      ),
      h('div',{style:{flex:1,background:C.navyLight,borderRadius:14,padding:16,textAlign:'center',border:'1px solid #2A3447'}},
        h('div',{style:{fontSize:28,fontWeight:900,color:C.blue}},reps),
        h('div',{style:{fontSize:11,color:C.silverDim,marginTop:4}},'REPS'),

          h('button',{onClick:()=>setReps(r=>Math.max(0,r-1)),className:'btn',style:{width:28,height:28,borderRadius:'50%',background:C.border,color:C.silver,fontSize:16,fontWeight:700}},'-'),
          h('button',{onClick:()=>setReps(r=>r+1),className:'btn',style:{width:28,height:28,borderRadius:'50%',background:C.blue,color:'#fff',fontSize:16,fontWeight:700}},'+')
        )

  );
}

function CoachScreen({setScreen,user}){
  const WELCOME_MSG={role:'coach',text:"Welcome to Phase 1. Your joints, tendons, movement patterns - we fix these FIRST. Daily non-negotiables, food logging, weekly body photo. No exceptions. Ask me anything."};
  const [msgs,setMsgs]=useState([WELCOME_MSG]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [historyLoaded,setHistoryLoaded]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);

  useEffect(()=>{
    if(!user){setHistoryLoaded(true);return;}
    sb.from('coach_messages').select('role,content').eq('user_id',user.id).order('created_at',{ascending:true}).then(({data})=>{
      if(data&&data.length>0){
        setMsgs(data.map(m=>({role:m.role,text:m.content})));
      }
      setHistoryLoaded(true);
    });
  },[user]);

  const saveMessage=async(role,text)=>{
    if(!user)return;
    await sb.from('coach_messages').insert({user_id:user.id,role,content:text});
  };

  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput('');
    setMsgs(m=>[...m,{role:'user',text:msg}]);setLoading(true);
    saveMessage('user',msg);
    try{
      const history=msgs.map(m=>({role:m.role==='coach'?'assistant':'user',content:m.text}));
      const res=await fetch(SB_URL+'/functions/v1/Coach-Skelly',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_ANON,'apikey':SB_ANON},
        body:JSON.stringify({message:msg,history})
      });
      const data=await res.json();
      const reply=data.reply||'Stay focused. No excuses.';
      setMsgs(m=>[...m,{role:'coach',text:reply}]);
      saveMessage('coach',reply);
    }catch(e){
      const reply='Connection issue. Keep grinding - no excuses on the workout.';
      setMsgs(m=>[...m,{role:'coach',text:reply}]);
    }
    setLoading(false);
  };

  return h('div',{style:{minHeight:'100vh',background:C.navy,display:'flex',flexDirection:'column',paddingBottom:140}},
    h('div',{style:{padding:'54px 24px 16px',background:C.navyMid,borderBottom:'1px solid #1C2535',display:'flex',alignItems:'center',gap:14}},
      h(Avatar,{size:48,animate:true}),
      h('div',null,
        h('div',{style:{fontSize:16,fontWeight:800,color:C.silverBright}},'Coach Skelly'),
        h('div',{style:{fontSize:11,color:C.success}},'Online')
      )
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:14}},
      msgs.map((m,i)=>h('div',{key:i,style:{display:'flex',gap:10,flexDirection:m.role==='user'?'row-reverse':'row'}},
        m.role==='coach'&&h(Avatar,{size:32}),
        h('div',{style:{maxWidth:'78%',padding:'12px 16px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',background:m.role==='user'?'linear-gradient(135deg,#1D4ED8,#3B82F6)':C.navyLight,fontSize:14,color:C.silverBright,lineHeight:1.6}},m.text)
      )),
      loading&&h('div',{style:{display:'flex',gap:10}},
        h(Avatar,{size:32}),
        h('div',{style:{background:C.navyLight,borderRadius:'18px 18px 18px 4px',padding:'12px 16px'}},
          h('div',{style:{display:'flex',gap:4}},
            [0,1,2].map(i=>h('div',{key:i,style:{width:6,height:6,borderRadius:'50%',background:C.silverDim,animation:'bounce 1s '+(i*0.2)+'s ease-in-out infinite'}}))
          )
        )
      ),
      h('div',{ref:bottomRef})
    ),
    h('div',{style:{position:'fixed',bottom:70,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,padding:'12px 16px',background:C.navy,borderTop:'1px solid #1C2535',display:'flex',gap:10}},
      h('input',{value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(),placeholder:'Ask Coach Skelly anything...',style:{flex:1,padding:'12px 16px',borderRadius:24,fontSize:14,background:C.navyLight,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none'}}),
      h('button',{onClick:send,className:'btn',style:{width:46,height:46,borderRadius:'50%',background:input.trim()?'linear-gradient(135deg,#1D4ED8,#3B82F6)':C.border,fontSize:18,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}},'→')
    ),
    h(BottomNav,{screen:S.COACH,setScreen})
  );
}

function NutritionScreen({setScreen,user,profile,setProfile}){
  const [meals,setMeals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [adding,setAdding]=useState(false);
  const [analyzing,setAnalyzing]=useState(false);
  const [form,setForm]=useState({name:'',cal:'',protein:'',carbs:'',fat:''});
  const [reviewing,setReviewing]=useState(false);
  const [reviewResult,setReviewResult]=useState(null);
  const [alreadyReviewed,setAlreadyReviewed]=useState(false);
  const [today,setToday]=useState(getLocalDate());

  useEffect(()=>{
    const id=setInterval(()=>{
      const nowDate=getLocalDate();
      if(nowDate!==today){
        setToday(nowDate);
        setMeals([]);
        setAlreadyReviewed(false);
        setReviewResult(null);
      }
    },30000);
    return ()=>clearInterval(id);
  },[today]);

  useEffect(()=>{if(user)load();},[user,today]);

  const load=async()=>{
    setLoading(true);
    const{data}=await sb.from('daily_logs').select('meals,id,food_reviewed').eq('user_id',user.id).eq('date',today).maybeSingle();
    setMeals(data?.meals||[]);
    setAlreadyReviewed(!!data?.food_reviewed);
    setLoading(false);
  };

  const askSkellyToReview=async()=>{
    if(meals.length===0||alreadyReviewed)return;
    setReviewing(true);
    const mealList=meals.map(m=>m.name+' ('+m.cal+' kcal, '+m.protein+'g protein)').join(', ');
    const msg='Here is everything I ate today: '+mealList+'. Was this a healthy day overall for someone in Phase 1 restore training? Respond with ONLY JSON: {"healthy":true,"feedback":"one short sentence"}';
    try{
      const res=await fetch(SB_URL+'/functions/v1/Coach-Skelly',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_ANON,'apikey':SB_ANON},
        body:JSON.stringify({message:msg})
      });
      const data=await res.json();
      const text=(data.reply||'{}').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(text);
      setReviewResult(parsed);
      if(parsed.healthy){
        const{data:freshProfile}=await sb.from('profiles').select('points').eq('id',user.id).maybeSingle();
        const basePoints=freshProfile?.points??(profile?.points||0);
        const np=basePoints+5;
        await sb.from('profiles').update({points:np}).eq('id',user.id);
        setProfile(p=>({...p,points:np}));
      }
      const{data:existing}=await sb.from('daily_logs').select('id').eq('user_id',user.id).eq('date',today).maybeSingle();
      if(existing)await sb.from('daily_logs').update({food_reviewed:true}).eq('id',existing.id);
      setAlreadyReviewed(true);
    }catch(e){
      setReviewResult({healthy:false,feedback:"Couldn't reach Skelly. Try again later."});
    }
    setReviewing(false);
  };

  const save=async(newMeals)=>{
    const{data:ex}=await sb.from('daily_logs').select('id').eq('user_id',user.id).eq('date',today).maybeSingle();
    if(ex){await sb.from('daily_logs').update({meals:newMeals}).eq('id',ex.id);}
    else{await sb.from('daily_logs').insert({user_id:user.id,date:today,meals:newMeals});}
  };

  const analyzePhoto=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setAnalyzing(true);
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const base64=ev.target.result.split(',')[1];
      try{
        const res=await fetch(SB_URL+'/functions/v1/rapid-handler',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_ANON,'apikey':SB_ANON},
          body:JSON.stringify({type:'food',image:base64,mediaType:'image/jpeg'})
        });
        const data=await res.json();
        const text=data.reply||'{}';
        const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
        setForm({name:parsed.name||'',cal:String(parsed.calories||''),protein:String(parsed.protein||''),carbs:String(parsed.carbs||''),fat:String(parsed.fat||'')});
        setAdding(true);
      }catch(e){setAdding(true);}
      setAnalyzing(false);
    };
    reader.readAsDataURL(file);
  };

  const addMeal=async()=>{
    if(!form.name.trim())return;
    const meal={name:form.name,cal:parseInt(form.cal)||0,protein:parseInt(form.protein)||0,carbs:parseInt(form.carbs)||0,fat:parseInt(form.fat)||0,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
    const newMeals=[...meals,meal];
    setMeals(newMeals);
    setForm({name:'',cal:'',protein:'',carbs:'',fat:''});
    setAdding(false);
    await save(newMeals);
  };

  const totals={cal:meals.reduce((s,m)=>s+(m.cal||0),0),protein:meals.reduce((s,m)=>s+(m.protein||0),0),carbs:meals.reduce((s,m)=>s+(m.carbs||0),0),fat:meals.reduce((s,m)=>s+(m.fat||0),0)};
  const pct=Math.min(Math.round((totals.cal/2200)*100),100);
  const inp={width:'100%',padding:'12px 14px',borderRadius:10,fontSize:14,background:C.navy,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none',boxSizing:'border-box',marginBottom:10};

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 100px'}},
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:4}},'NUTRITION LOG'),
    h('div',{style:{fontSize:26,fontWeight:900,color:C.silverBright,marginBottom:16}},"Today's Fuel"),
    h('div',{style:{background:C.navyLight,borderRadius:20,padding:20,display:'flex',alignItems:'center',gap:20,marginBottom:16}},
      h('div',{style:{position:'relative',width:80,height:80,flexShrink:0}},
        h('svg',{width:'80',height:'80',viewBox:'0 0 80 80'},
          h('circle',{cx:'40',cy:'40',r:'34',fill:'none',stroke:C.border,strokeWidth:'8'}),
          h('circle',{cx:'40',cy:'40',r:'34',fill:'none',stroke:C.blue,strokeWidth:'8',strokeDasharray:(2*Math.PI*34*pct/100)+' '+(2*Math.PI*34),strokeLinecap:'round',transform:'rotate(-90 40 40)'})
        ),
        h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}},
          h('div',{style:{fontSize:14,fontWeight:900,color:C.white}},pct+'%')
        )
      ),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:28,fontWeight:900,color:C.white}},totals.cal.toLocaleString()),
        h('div',{style:{fontSize:13,color:C.silverDim}},'of 2,200 kcal'),
        h('div',{style:{display:'flex',gap:10,marginTop:8,flexWrap:'wrap'}},
          h('div',{style:{fontSize:11,color:C.blue}},totals.protein+'g protein'),
          h('div',{style:{fontSize:11,color:C.warning}},totals.carbs+'g carbs'),
          h('div',{style:{fontSize:11,color:C.danger}},totals.fat+'g fat')
        )
      )
    ),
    h('div',{style:{display:'flex',gap:10,marginBottom:16}},
      h('label',{style:{flex:1,padding:'12px',background:analyzing?C.navyLight:'#22C55E20',border:'1px solid #22C55E40',borderRadius:12,cursor:'pointer',textAlign:'center',color:C.success,fontSize:13,fontWeight:700}},
        analyzing?'Analyzing...':'📸 Photo',
        h('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'},onChange:analyzePhoto,disabled:analyzing})
      ),
      h('button',{onClick:()=>setAdding(true),className:'btn',style:{flex:1,padding:'12px',background:'#3B82F620',border:'1px solid #3B82F640',borderRadius:12,color:C.blue,fontSize:13,fontWeight:700}},'✏️ Manual')
    ),
    adding&&h('div',{style:{background:C.navyLight,borderRadius:14,padding:16,border:'1px solid #3B82F640',marginBottom:14}},
      h('div',{style:{fontSize:12,color:C.blue,fontWeight:700,marginBottom:10}},'LOG A MEAL'),
      h('input',{style:inp,placeholder:'Meal name',value:form.name,onChange:e=>setForm(f=>({...f,name:e.target.value}))}),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}},
        h('div',null,h('div',{style:{fontSize:10,color:C.silverDim,marginBottom:4,fontWeight:600}},'CALORIES'),h('input',{style:{...inp,marginBottom:0},placeholder:'450',value:form.cal,onChange:e=>setForm(f=>({...f,cal:e.target.value})),type:'number'})),
        h('div',null,h('div',{style:{fontSize:10,color:C.blue,marginBottom:4,fontWeight:600}},'PROTEIN (g)'),h('input',{style:{...inp,marginBottom:0},placeholder:'35',value:form.protein,onChange:e=>setForm(f=>({...f,protein:e.target.value})),type:'number'})),
        h('div',null,h('div',{style:{fontSize:10,color:C.warning,marginBottom:4,fontWeight:600}},'CARBS (g)'),h('input',{style:{...inp,marginBottom:0},placeholder:'40',value:form.carbs,onChange:e=>setForm(f=>({...f,carbs:e.target.value})),type:'number'})),
        h('div',null,h('div',{style:{fontSize:10,color:C.danger,marginBottom:4,fontWeight:600}},'FAT (g)'),h('input',{style:{...inp,marginBottom:0},placeholder:'12',value:form.fat,onChange:e=>setForm(f=>({...f,fat:e.target.value})),type:'number'}))
      ),
      h('div',{style:{display:'flex',gap:10}},
        h('button',{onClick:addMeal,className:'btn',style:{flex:1,padding:'12px 0',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:10,color:'#fff',fontSize:14,fontWeight:700}},'LOG MEAL'),
        h('button',{onClick:()=>setAdding(false),className:'btn',style:{padding:'12px 16px',background:C.border,borderRadius:10,color:C.silverDim,fontSize:14}},'Cancel')
      )
    ),
    loading?h('div',{style:{textAlign:'center',color:C.silverDim,padding:20}},'Loading...'):
    meals.length===0?h('div',{style:{background:C.navyLight,borderRadius:14,padding:24,textAlign:'center',border:'1px solid #2A3447'}},
      h('div',{style:{fontSize:32,marginBottom:8}},'🥗'),
      h('div',{style:{fontSize:14,color:C.silverDim}},'No meals logged yet.'),
      h('div',{style:{fontSize:13,color:C.silverDim,marginTop:4}},'Snap a photo or add manually.')
    ):h('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:16}},
      meals.map((m,i)=>h('div',{key:i,style:{background:C.navyLight,borderRadius:14,padding:'14px 16px',border:'1px solid #2A3447'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
          h('div',{style:{fontSize:14,fontWeight:700,color:C.silverBright}},m.name),
          h('div',{style:{fontSize:14,fontWeight:800,color:C.white}},m.cal+' kcal')
        ),
        h('div',{style:{display:'flex',gap:10}},
          m.protein>0&&h('div',{style:{fontSize:11,color:C.blue}},m.protein+'g protein'),
          m.carbs>0&&h('div',{style:{fontSize:11,color:C.warning}},m.carbs+'g carbs'),
          m.fat>0&&h('div',{style:{fontSize:11,color:C.danger}},m.fat+'g fat'),
          h('div',{style:{fontSize:11,color:C.silverDim,marginLeft:'auto'}},m.time)
        )
      ))
    ),
    meals.length>0&&!alreadyReviewed&&h('button',{onClick:askSkellyToReview,disabled:reviewing,className:'btn',style:{width:'100%',marginBottom:16,padding:'14px 0',background:reviewing?C.navyLight:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:14,color:'#fff',fontSize:14,fontWeight:800}},reviewing?'Skelly is reviewing...':"💀 ASK SKELLY TO REVIEW MY DAY"),
    reviewResult&&h('div',{style:{background:reviewResult.healthy?'#22C55E15':'#F59E0B15',border:'1px solid '+(reviewResult.healthy?'#22C55E40':'#F59E0B40'),borderRadius:14,padding:16,marginBottom:16,display:'flex',gap:12}},
      h('div',{style:{fontSize:24}},reviewResult.healthy?'✅':'🤔'),
      h('div',null,
        h('div',{style:{fontSize:13,fontWeight:800,color:reviewResult.healthy?C.success:C.warning}},reviewResult.healthy?'Solid day. +5 points':'Room to improve'),
        h('div',{style:{fontSize:12,color:C.silver,marginTop:2}},reviewResult.feedback)
      )
    ),
    h('div',{style:{background:'#3B82F610',border:'1px solid #3B82F630',borderRadius:14,padding:16,display:'flex',gap:12}},
      h(Avatar,{size:36}),
      h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},
        meals.length===0?'"Log your meals. Snap a photo and I will analyze the macros automatically."':
        totals.protein<100?'"Protein is low. Aim for at least 100g daily to support muscle recovery."':
        '"Good work logging your meals. Keep protein high and carbs clean."'
      )
    ),
    h(BottomNav,{screen:S.NUTRITION,setScreen})
  );
}

function ProgressScreen({setScreen,user,profile,setProfile}){
  const [photos,setPhotos]=useState({front:null,side:null,back:null,legs:null});
  const [weight,setWeight]=useState('');
  const [analyzing,setAnalyzing]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState('');
  const [improvementBonus,setImprovementBonus]=useState(false);
  const ANGLES=[{id:'front',label:'Front',icon:'🧍'},{id:'side',label:'Side',icon:'🚶'},{id:'back',label:'Back',icon:'🔙'},{id:'legs',label:'Legs',icon:'🦵'}];
  const fileRefs=useRef({});

  useEffect(()=>{
    if(profile?.body_score)setResult({score:profile.body_score,feedback:profile.body_feedback});
  },[profile]);

  const capturePhoto=(angleId)=>(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const base64=ev.target.result.split(',')[1];
      setPhotos(p=>({...p,[angleId]:base64}));
    };
    reader.readAsDataURL(file);
    e.target.value='';
  };

  const triggerCapture=(angleId)=>{
    if(analyzing)return;
    const el=fileRefs.current[angleId];
    if(el)el.click();
  };


  const readyCount=Object.values(photos).filter(Boolean).length;
  const canAnalyze=readyCount>0&&weight.trim()!=='';

  const analyzeAll=async()=>{
    if(!canAnalyze)return;
    setAnalyzing(true);setError('');setResult(null);
    try{
      const images=Object.values(photos).filter(Boolean);
      const contextParts=[];
      if(weight.trim())contextParts.push('Current weight: '+weight.trim()+' lbs');
      if(profile?.height)contextParts.push('Height: '+profile.height);
      if(profile?.age)contextParts.push('Age: '+profile.age);
      if(profile?.goal)contextParts.push('Goal: '+profile.goal);
      const context=contextParts.length?contextParts.join('. ')+'. Factor this into your honest assessment - be specific about whether the physique matches expectations for these stats.':'';
      const res=await fetch(SB_URL+'/functions/v1/rapid-handler',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_ANON,'apikey':SB_ANON},
        body:JSON.stringify({type:'body',images,mediaType:'image/jpeg',context})
      });
      const data=await res.json();
      const text=data.reply||'{}';
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      setResult(parsed);
      const prevScore=profile?.body_score;
      let pointsBonus=0;
      let bonusEarned=false;
      if(prevScore!=null&&parsed.score>prevScore){pointsBonus=10;bonusEarned=true;}
      const np=(profile?.points||0)+pointsBonus;
      await sb.from('profiles').update({body_score:parsed.score,body_feedback:parsed.overall,last_photo_date:getLocalDate(),points:np,weight:weight.trim()}).eq('id',user.id);
      setProfile(p=>({...p,body_score:parsed.score,body_feedback:parsed.overall,points:np,weight:weight.trim()}));
      setImprovementBonus(bonusEarned);
      setPhotos({front:null,side:null,back:null,legs:null});
      setWeight('');
    }catch(e){setError('Analysis failed. Try again in a moment.');}
    setAnalyzing(false);
  };

  const lastDate=profile?.last_photo_date;
  const daysSince=lastDate?Math.floor((new Date()-new Date(lastDate))/(1000*60*60*24)):null;
  const canUpload=!lastDate||daysSince>=7;

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 100px'}},
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:4}},'BODY PROGRESS'),
    h('div',{style:{fontSize:26,fontWeight:900,color:C.silverBright,marginBottom:4}},'Weekly Check-In'),
    h('div',{style:{fontSize:13,color:C.silverDim,marginBottom:24}},'Coach Skelly scores your body out of 100 every week'),
    profile?.body_score&&h('div',{style:{background:'linear-gradient(135deg,#1C3A6B,#0D2040)',borderRadius:20,padding:24,marginBottom:20,border:'1px solid #1D4ED850',textAlign:'center'}},
      h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:8}},'YOUR CURRENT SCORE'),
      h('div',{style:{display:'flex',alignItems:'baseline',justifyContent:'center',gap:12}},
        h('div',{style:{fontSize:64,fontWeight:900,color:C.white,lineHeight:1}},profile.body_score),
        h('div',{style:{fontSize:32,fontWeight:900,color:gradeColor(profile.body_score)}},getGrade(profile.body_score))
      ),
      h('div',{style:{fontSize:14,color:C.silverDim,marginTop:4}},'out of 100')
    ),
    improvementBonus&&h('div',{style:{background:'#22C55E15',border:'1px solid #22C55E40',borderRadius:14,padding:'14px 16px',marginBottom:16,display:'flex',gap:12,alignItems:'center'}},
      h('div',{style:{fontSize:24}},'📈'),
      h('div',null,
        h('div',{style:{fontSize:13,fontWeight:800,color:C.success}},'Score improved! +10 points'),
        h('div',{style:{fontSize:12,color:C.silverDim}},'Keep it up.')
      )
    ),
    result&&h('div',{style:{background:C.navyLight,borderRadius:16,padding:18,border:'1px solid #2A3447',marginBottom:20}},
      h('div',{style:{display:'flex',gap:12,alignItems:'flex-start',marginBottom:14}},
        h(Avatar,{size:40}),
        h('div',null,
          h('div',{style:{fontSize:12,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:4}},"COACH SKELLY'S ANALYSIS"),
          h('div',{style:{fontSize:16,fontWeight:900,color:C.white}},result.score+'/100 ('+getGrade(result.score)+')'),
          h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6,marginTop:4}},result.overall||result.feedback)
        )
      ),
      result.stomach&&h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        ['stomach','shoulders','chest','legs'].map(part=>result[part]&&h('div',{key:part,style:{background:C.navy,borderRadius:10,padding:'10px 14px'}},
          h('div',{style:{fontSize:10,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:3}},part.toUpperCase()),
          h('div',{style:{fontSize:13,color:C.silver}},result[part])
        ))
      ),
      result.advice&&h('div',{style:{background:'#22C55E10',border:'1px solid #22C55E30',borderRadius:10,padding:14,marginTop:12}},
        h('div',{style:{fontSize:11,color:C.success,fontWeight:700,marginBottom:4}},'FOCUS ON'),
        h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},result.advice)
      )
    ),
    error&&h('div',{style:{background:'#EF444415',border:'1px solid #EF444440',borderRadius:10,padding:12,marginBottom:16,fontSize:13,color:C.danger}},error),
    canUpload?h('div',{style:{marginBottom:16}},
      h('div',{style:{background:'#F59E0B10',border:'1px solid #F59E0B30',borderRadius:12,padding:'10px 14px',marginBottom:14,fontSize:12,color:C.warning,fontWeight:600}},'📅 Weekly check-in ready'),
      h('div',{style:{fontSize:12,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:6}},'YOUR CURRENT WEIGHT (lbs)'),
      h('input',{value:weight,onChange:e=>setWeight(e.target.value),placeholder:'e.g. 178',type:'number',style:{width:'100%',padding:'12px 14px',borderRadius:10,fontSize:15,background:C.navyLight,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none',boxSizing:'border-box',marginBottom:14}}),
      h('div',{style:{fontSize:12,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:10}},'CAPTURE YOUR ANGLES ('+readyCount+'/4)'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}},
        ANGLES.map(a=>h('div',{key:a.id,style:{position:'relative'}},
          h('div',{onClick:()=>triggerCapture(a.id),style:{padding:photos[a.id]?0:'18px 10px',background:photos[a.id]?'transparent':C.navyLight,border:'1.5px solid '+(photos[a.id]?'#22C55E60':C.border),borderRadius:14,cursor:'pointer',textAlign:'center',overflow:'hidden'}},
            photos[a.id]?h('img',{src:'data:image/jpeg;base64,'+photos[a.id],style:{width:'100%',height:110,objectFit:'cover',display:'block',borderRadius:12,pointerEvents:'none'}}):h('div',{style:{pointerEvents:'none'}},
              h('div',{style:{fontSize:28,marginBottom:6}},a.icon),
              h('div',{style:{fontSize:12,fontWeight:700,color:C.silver}},a.label)
            )
          ),
          h('input',{ref:el=>{fileRefs.current[a.id]=el;},type:'file',accept:'image/*',capture:'user',style:{display:'none'},onChange:capturePhoto(a.id)}),
          photos[a.id]&&h('div',{style:{position:'absolute',bottom:6,left:0,right:0,textAlign:'center',fontSize:11,fontWeight:700,color:'#fff',background:'rgba(0,0,0,0.55)',padding:'3px 0',pointerEvents:'none'}},a.label+' - tap to retake'),
          photos[a.id]&&h('button',{onClick:(e)=>{e.stopPropagation();setPhotos(p=>({...p,[a.id]:null}));},className:'btn',style:{position:'absolute',top:6,right:6,width:24,height:24,borderRadius:'50%',background:'rgba(0,0,0,0.65)',color:'#fff',fontSize:13,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}},'✕')
        ))
      ),
      h('button',{onClick:analyzeAll,disabled:!canAnalyze||analyzing,className:'btn',style:{width:'100%',padding:'16px 0',background:!canAnalyze?C.border:(analyzing?C.navyLight:'linear-gradient(135deg,#1D4ED8,#3B82F6)'),borderRadius:14,color:!canAnalyze?C.silverDim:'#fff',fontSize:15,fontWeight:800}},
        analyzing?'🔍 Coach Skelly is analyzing...':'ANALYZE MY PROGRESS ('+readyCount+' photo'+(readyCount===1?'':'s')+')'
      ),
      h('div',{style:{fontSize:11,color:C.silverDim,marginTop:8,textAlign:'center'}},readyCount===0?'Add at least one angle to continue.':(weight.trim()===''?'Enter your weight to continue.':'More angles = better feedback.'))
    ):h('div',{style:{background:C.navyLight,borderRadius:14,padding:20,textAlign:'center',border:'1px solid #2A3447',marginBottom:16}},
      h('div',{style:{fontSize:32,marginBottom:8}},'⏰'),
      h('div',{style:{fontSize:14,fontWeight:700,color:C.silverBright}},'Next check-in in '+(7-daysSince)+' days'),
      h('div',{style:{fontSize:12,color:C.silverDim,marginTop:4}},'Weekly photo + weight, every Sunday night')
    ),
    h('div',{style:{background:'#3B82F610',border:'1px solid #3B82F630',borderRadius:14,padding:16,display:'flex',gap:12}},
      h(Avatar,{size:36}),
      h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},
        profile?.body_score?'"You are at a '+profile.body_score+'/100 ('+getGrade(profile.body_score)+'). Keep hitting your non-negotiables and eating right."':'"Submit your first body photos. I will give you an honest assessment. No sugarcoating."'
      )
    ),
    h(BottomNav,{screen:S.PROGRESS,setScreen})
  );
}

function LeaderboardScreen({setScreen,profile}){
  const [mode,setMode]=useState('points');
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setLoading(true);
    if(mode==='points'){
      sb.from('profiles').select('full_name,points,streak,phase,avatar_url').order('points',{ascending:false}).limit(20).then(({data})=>{
        setUsers(data||[]);
        setLoading(false);
      });
    }else{
      sb.from('profiles').select('full_name,body_score,streak,avatar_url').not('body_score','is',null).order('body_score',{ascending:false}).limit(20).then(({data})=>{
        setUsers(data||[]);
        setLoading(false);
      });
    }
  },[mode]);

  const myPoints=profile?.points||0;
  const shirtPct=Math.min(Math.round((myPoints/5000)*100),100);

  const medals=['🥇','🥈','🥉'];
  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 100px'}},
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:4}},'COMMUNITY'),
    h('div',{style:{fontSize:26,fontWeight:900,color:C.silverBright,marginBottom:4}},'Rankings'),
    h('div',{style:{fontSize:13,color:C.silverDim,marginBottom:16}},'Top 5 win a free HBHM compression shirt 👕'),
    h('div',{style:{display:'flex',background:C.navyLight,borderRadius:12,padding:4,marginBottom:20}},
      h('button',{onClick:()=>setMode('points'),className:'btn',style:{flex:1,padding:'10px 0',borderRadius:10,background:mode==='points'?C.blue:'transparent',color:mode==='points'?'#fff':C.silverDim,fontSize:13,fontWeight:700}},'🏆 Points'),
      h('button',{onClick:()=>setMode('body'),className:'btn',style:{flex:1,padding:'10px 0',borderRadius:10,background:mode==='body'?C.blue:'transparent',color:mode==='body'?'#fff':C.silverDim,fontSize:13,fontWeight:700}},'💪 Body Rank')
    ),
    mode==='points'&&h('div',{style:{background:'linear-gradient(135deg,#1C3A6B,#0D2040)',borderRadius:16,padding:'14px 20px',marginBottom:16,border:'1px solid #1D4ED850',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,
        h('div',{style:{fontSize:12,color:C.blue,fontWeight:700}},'MONTHLY PRIZE'),
        h('div',{style:{fontSize:16,fontWeight:800,color:C.white,marginTop:2}},'HBHM Compression Long Sleeve')
      ),
      h('div',{style:{fontSize:36}},'👕')
    ),
    mode==='points'&&h('div',{style:{background:C.navyLight,borderRadius:16,padding:'16px 20px',marginBottom:24,border:'1px solid #2A3447'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        h('div',{style:{fontSize:12,color:C.silverDim,fontWeight:700,letterSpacing:1}},'5,000 PT SHIRT MILESTONE'),
        h('div',{style:{fontSize:12,fontWeight:800,color:C.white}},myPoints.toLocaleString()+' / 5,000')
      ),
      h('div',{style:{height:8,background:C.border,borderRadius:4,overflow:'hidden'}},
        h('div',{style:{height:'100%',borderRadius:4,background:shirtPct>=100?C.success:C.blue,width:shirtPct+'%',transition:'width 0.3s'}})
      )
    ),
    loading?h('div',{style:{textAlign:'center',color:C.silverDim,padding:20}},'Loading...'):
    users.length===0?h('div',{style:{background:C.navyLight,borderRadius:14,padding:24,textAlign:'center',border:'1px solid #2A3447'}},
      h('div',{style:{fontSize:32,marginBottom:8}},mode==='points'?'🏆':'💪'),
      h('div',{style:{fontSize:14,color:C.silverDim}},mode==='points'?'No rankings yet. Be the first to log a streak.':'No body scores yet. Submit a weekly check-in to rank.')
    ):h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      users.map((u,i)=>h('div',{key:i,style:{background:C.navyLight,borderRadius:14,padding:'14px 16px',border:'1.5px solid #2A3447',display:'flex',alignItems:'center',gap:14}},
        h('div',{style:{width:36,height:36,borderRadius:'50%',background:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:i<3?20:13,fontWeight:700,flexShrink:0,overflow:'hidden'}},
          u.avatar_url?h('img',{src:u.avatar_url,style:{width:'100%',height:'100%',objectFit:'cover'}}):(medals[i]||(i+1)+'th')
        ),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:14,fontWeight:800,color:C.silverBright}},u.full_name||'Athlete'),
          h('div',{style:{fontSize:11,color:C.silverDim,marginTop:2}},'Streak: '+(u.streak||0)+' days')
        ),
        mode==='points'?h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:16,fontWeight:900,color:C.white}},(u.points||0).toLocaleString()),
          h('div',{style:{fontSize:10,color:C.silverDim}},'pts')
        ):h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:16,fontWeight:900,color:gradeColor(u.body_score)}},u.body_score+' '+getGrade(u.body_score)),
          h('div',{style:{fontSize:10,color:C.silverDim}},'score')
        )
      ))
    ),
    h(BottomNav,{screen:S.LEADERBOARD,setScreen})
  );
}

function ProfileScreen({setScreen,user,profile,setProfile}){
  const [name,setName]=useState(profile?.full_name||'');
  const [uploading,setUploading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const fileRef=useRef(null);

  const uploadPhoto=async(e)=>{
    const file=e.target.files[0];if(!file||!user)return;
    setUploading(true);
    try{
      const path=user.id+'/avatar.jpg';
      const{error:upErr}=await sb.storage.from('avatars').upload(path,file,{upsert:true,contentType:file.type||'image/jpeg'});
      if(upErr)throw upErr;
      const{data}=sb.storage.from('avatars').getPublicUrl(path);
      const url=data.publicUrl+'?t='+Date.now();
      await sb.from('profiles').update({avatar_url:url}).eq('id',user.id);
      setProfile(p=>({...p,avatar_url:url}));
    }catch(err){alert('Photo upload failed. Try again.');}
    setUploading(false);
  };

  const saveName=async()=>{
    if(!name.trim()||!user)return;
    setSaving(true);
    await sb.from('profiles').update({full_name:name.trim()}).eq('id',user.id);
    setProfile(p=>({...p,full_name:name.trim()}));
    setSaving(false);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const signOut=async()=>{
    await sb.auth.signOut();
    setScreen(S.AUTH);
  };

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 100px'}},
    h('button',{onClick:()=>setScreen(S.DASH),className:'btn',style:{background:'none',color:C.blue,fontSize:13,fontWeight:700,marginBottom:20,padding:0}},'Back to Home'),
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:4}},'YOUR PROFILE'),
    h('div',{style:{fontSize:26,fontWeight:900,color:C.silverBright,marginBottom:24}},'Account'),
    h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:28}},
      h('button',{onClick:()=>fileRef.current&&fileRef.current.click(),disabled:uploading,className:'btn',style:{position:'relative',background:'none',padding:0}},
        profile?.avatar_url?h('img',{src:profile.avatar_url,style:{width:100,height:100,borderRadius:'50%',objectFit:'cover',border:'2px solid #2A3447'}}):h(Avatar,{size:100}),
        h('div',{style:{position:'absolute',bottom:0,right:0,width:32,height:32,borderRadius:'50%',background:C.blue,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,border:'2px solid #0D1117'}},uploading?'…':'📷')
      ),
      h('input',{ref:fileRef,type:'file',accept:'image/*',style:{display:'none'},onChange:uploadPhoto}),
      h('div',{style:{fontSize:12,color:C.silverDim,marginTop:10}},'Tap to change photo')
    ),
    h('div',{style:{display:'flex',gap:12,marginBottom:24}},
      h('div',{style:{flex:1,background:'#F59E0B10',border:'1px solid #F59E0B30',borderRadius:16,padding:'14px 16px',textAlign:'center'}},
        h('div',{style:{fontSize:20,fontWeight:900,color:C.white}},(profile?.points||0).toLocaleString()),
        h('div',{style:{fontSize:11,color:C.silverDim}},'points')
      ),
      h('div',{style:{flex:1,background:'#3B82F610',border:'1px solid #3B82F630',borderRadius:16,padding:'14px 16px',textAlign:'center'}},
        h('div',{style:{fontSize:20,fontWeight:900,color:C.white}},profile?.streak||0),
        h('div',{style:{fontSize:11,color:C.silverDim}},'day streak')
      ),
      h('div',{style:{flex:1,background:'#22C55E10',border:'1px solid #22C55E30',borderRadius:16,padding:'14px 16px',textAlign:'center'}},
        h('div',{style:{fontSize:20,fontWeight:900,color:C.success}},'T'+(profile?.tier||1)),
        h('div',{style:{fontSize:11,color:C.silverDim}},'tier')
      )
    ),
    h('div',{style:{fontSize:11,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:6}},'YOUR NAME'),
    h('input',{value:name,onChange:e=>setName(e.target.value),placeholder:'Your name',style:{width:'100%',padding:'14px 16px',borderRadius:12,fontSize:15,background:C.navyLight,border:'1.5px solid #2A3447',color:C.silverBright,outline:'none',boxSizing:'border-box',marginBottom:12}}),
    h('button',{onClick:saveName,disabled:saving,className:'btn',style:{width:'100%',padding:'14px 0',background:saved?C.success:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:12,color:'#fff',fontSize:14,fontWeight:800,marginBottom:28}},saved?'✓ Saved':(saving?'Saving...':'SAVE NAME')),
    h('button',{onClick:signOut,className:'btn',style:{width:'100%',padding:'14px 0',background:'transparent',border:'1px solid #EF444460',borderRadius:12,color:C.danger,fontSize:14,fontWeight:700}},'Sign Out')
  );
}

function App(){
  const [screen,setScreen]=useState(S.LOADING);
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [ex,setEx]=useState(null);
  const [workouts,setWorkouts]=useState([]);

  const loadProfile=async(id)=>{
    const{data}=await sb.from('profiles').select('*').eq('id',id).maybeSingle();
    if(data)setProfile(data);
    return data;
  };

  const loadWorkouts=async()=>{
    const{data}=await sb.from('workouts').select('*').order('id',{ascending:true});
    if(data){
      setWorkouts(data.map(w=>({id:w.id,name:w.name,duration:w.duration,type:w.type,sets:w.sets,primary:w.primary_muscles||[],secondary:w.secondary_muscles||[],tip:w.tip,why:w.why})));
    }
  };

  useEffect(()=>{
    loadWorkouts();
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){
        setUser(session.user);
        await loadProfile(session.user.id);
        setScreen(S.DASH);
      } else {
        setScreen(S.AUTH);
      }
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(_,session)=>{
      if(session?.user){setUser(session.user);await loadProfile(session.user.id);}
      else{setUser(null);setProfile(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const render=()=>{
    switch(screen){
      case S.LOADING:return h('div',{style:{minHeight:'100vh',background:C.navy,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}},
        h(Logo,{size:80,animate:true}),
        h('div',{style:{fontSize:11,color:C.silverDim,letterSpacing:3}},'LOADING...')
      );
      case S.AUTH:return h(AuthScreen,{setScreen,setUser});
      case S.WELCOME:return h(WelcomeScreen,{setScreen});
      case S.ONBOARDING:return h(OnboardingFlow,{setScreen,user,setProfile});
      case S.PAYMENT:return h(PaymentScreen,{setScreen});
      case S.DASH:return h(DashScreen,{setScreen,user,profile,setProfile});
      case S.WORKOUT:return h(WorkoutScreen,{setScreen,setEx,profile,user,setProfile,workouts});
      case S.EXERCISE:return h(ExerciseScreen,{setScreen,exercise:ex,user,profile,setProfile});
      case S.COACH:return h(CoachScreen,{setScreen,user});
      case S.NUTRITION:return h(NutritionScreen,{setScreen,user,profile,setProfile});
      case S.PROGRESS:return h(ProgressScreen,{setScreen,user,profile,setProfile});
      case S.LEADERBOARD:return h(LeaderboardScreen,{setScreen,profile});
      case S.PROFILE:return h(ProfileScreen,{setScreen,user,profile,setProfile});
      default:return null;
    }
  };

  return h('div',{style:{maxWidth:430,margin:'0 auto',minHeight:'100vh',background:C.navy}},render());
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
