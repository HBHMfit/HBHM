<script>
const {useState,useEffect,createElement:h} = React;
const {createClient} = supabase;
const sb = createClient('https://dxpurntcbiplzjhpdisp.supabase.co','sb_publishable_yuJxW-ukJ4evDAiRhDBrGQ_pJtG9X0W');

const C={navy:'#0D1117',navyMid:'#141B26',navyLight:'#1C2535',border:'#2A3447',silver:'#C0C8D8',silverBright:'#E8ECF4',silverDim:'#6B7280',blue:'#3B82F6',white:'#FFFFFF',success:'#22C55E',warning:'#F59E0B',danger:'#EF4444'};

    h('line',{x1:'5',y1:'43',x2:'25',y2:'43',stroke:'#C0C8D8',strokeWidth:'3',strokeLinecap:'round'}),
    h('line',{x1:'8',y1:'50',x2:'26',y2:'50',stroke:'#C0C8D8',strokeWidth:'2.5',strokeLinecap:'round'}),
    h('circle',{cx:'70',cy:'18',r:'9',fill:'#C0C8D8'}),
    h('line',{x1:'67',y1:'27',x2:'52',y2:'50',stroke:'#C0C8D8',strokeWidth:'6',strokeLinecap:'round'}),
    h('line',{x1:'62',y1:'33',x2:'44',y2:'26',stroke:'#C0C8D8',strokeWidth:'5',strokeLinecap:'round'}),
    h('line',{x1:'60',y1:'40',x2:'76',y2:'34',stroke:'#C0C8D8',strokeWidth:'5',strokeLinecap:'round'}),
    h('line',{x1:'52',y1:'50',x2:'42',y2:'68',stroke:'#C0C8D8',strokeWidth:'6',strokeLinecap:'round'}),
    h('line',{x1:'42',y1:'68',x2:'50',y2:'82',stroke:'#C0C8D8',strokeWidth:'5',strokeLinecap:'round'}),
    h('line',{x1:'52',y1:'50',x2:'68',y2:'60',stroke:'#C0C8D8',strokeWidth:'6',strokeLinecap:'round'}),
    h('line',{x1:'68',y1:'60',x2:'82',y2:'52',stroke:'#C0C8D8',strokeWidth:'5',strokeLinecap:'round'})
  );
}

function Avatar({size=48,animate=false}){
  return h('div',{style:{width:size,height:size,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,#141B26,#1C2535)',border:`1.5px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',animation:animate?'pulse 2s ease-in-out infinite':undefined}},
    h(Logo,{size:size*0.68})
  );
}

function PhaseTag({phase}){
  const d={1:{label:'PHASE 1 · RESTORE',color:C.success},2:{label:'PHASE 2 · CONDITION',color:C.warning},3:{label:'PHASE 3 · STRENGTHEN',color:C.danger}}[phase];
  return h('span',{style:{fontSize:10,fontWeight:700,letterSpacing:1.5,color:d.color,background:d.color+'20',padding:'3px 10px',borderRadius:20,border:`1px solid ${d.color}40`}},d.label);
}

function BottomNav({screen,setScreen}){
  const tabs=[{id:S.DASH,icon:'⚡',label:'Home'},{id:S.WORKOUT,icon:'💪',label:'Workout'},{id:S.COACH,icon:'💀',label:'Coach'},{id:S.NUTRITION,icon:'🥗',label:'Nutrition'},{id:S.LEADERBOARD,icon:'🏆',label:'Ranks'}];
  return h('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:C.navy,borderTop:`1px solid ${C.navyLight}`,display:'flex',justifyContent:'space-around',padding:'10px 0 22px',zIndex:100}},
    tabs.map(t=>h('button',{key:t.id,onClick:()=>setScreen(t.id),className:'btn',style:{background:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:screen===t.id?C.blue:C.silverDim}},
      h('span',{style:{fontSize:20}},t.icon),
      h('span',{style:{fontSize:10,fontWeight:600}},t.label)
    ))
  );
}

function AuthScreen({setScreen,setUser}){
  const [mode,setMode]=useState('signup');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [name,setName]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const inp={width:'100%',padding:'14px 16px',borderRadius:12,fontSize:15,background:C.navyLight,border:`1.5px solid ${C.border}`,color:C.silverBright,outline:'none',boxSizing:'border-box'};
  
  const handle=async()=>{
    setError('');setLoading(true);
    try{
      if(mode==='signup'){
        const{data,error:err}=await sb.auth.signUp({email,password,options:{data:{full_name:name}}});
        if(err)throw err;
        if(data.user){
          await sb.from('profiles').upsert({id:data.user.id,full_name:name,email,phase:1,streak:0,points:0,created_at:new Date().toISOString()});
          setUser(data.user);setScreen(S.WELCOME);
        }
      }else{
        const{data,error:err}=await sb.auth.signInWithPassword({email,password});
        if(err)throw err;
        setUser(data.user);setScreen(S.DASH);
      }
    }catch(err){setError(err.message);}
    setLoading(false);
  };

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'60px 24px 40px'}},
    h('div',{style:{textAlign:'center',marginBottom:32}},
      h('div',{style:{display:'flex',justifyContent:'center',marginBottom:16}},h(Logo,{size:70})),
      h('div',{style:{fontSize:42,fontWeight:900,letterSpacing:6,color:C.silverBright}},'HBHM'),
      h('div',{style:{fontSize:11,letterSpacing:3,color:C.silverDim,marginTop:4}},'HEALTHY BODY HEALTHY MIND')
    ),
    h('div',{style:{display:'flex',background:C.navyLight,borderRadius:12,padding:4,marginBottom:24}},
      ['signup','signin'].map(m=>h('button',{key:m,onClick:()=>setMode(m),className:'btn',style:{flex:1,padding:'10px 0',borderRadius:10,background:mode===m?C.blue:'transparent',color:mode===m?'#fff':C.silverDim,fontSize:14,fontWeight:700}},m==='signup'?'Sign Up':'Sign In'))
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      mode==='signup'&&h('div',null,h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'YOUR NAME'),h('input',{style:inp,placeholder:'First name',value:name,onChange:e=>setName(e.target.value)})),
      h('div',null,h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'EMAIL'),h('input',{style:inp,placeholder:'your@email.com',value:email,onChange:e=>setEmail(e.target.value),type:'email'})),
      h('div',null,h('div',{style:{fontSize:11,color:C.silverDim,marginBottom:6,fontWeight:600,letterSpacing:1}},'PASSWORD'),h('input',{style:inp,placeholder:'Min. 6 characters',value:password,onChange:e=>setPassword(e.target.value),type:'password'}))
    ),
    error&&h('div',{style:{background:`${C.danger}15`,border:`1px solid ${C.danger}40`,borderRadius:10,padding:12,marginTop:16,fontSize:13,color:C.danger}},error),
    h('button',{onClick:handle,disabled:loading,className:'btn',style:{width:'100%',marginTop:24,padding:'16px 0',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:14,color:'#fff',fontSize:15,fontWeight:800,opacity:loading?0.7:1}},loading?'Please wait...':(mode==='signup'?'CREATE ACCOUNT':'SIGN IN')),
    h('div',{style:{textAlign:'center',marginTop:12,fontSize:12,color:C.silverDim}},'$5/week · You only get one body')
  );
}

const SLIDES=[
  {icon:null,title:'Welcome to HBHM.',body:"I'm Coach Skelly. You only get one body. What you do with it every single day is your choice.",cta:"I'M READY →"},
  {icon:'💀',title:"I don't do easy.",body:"Every day: log your non-negotiables, log your food, show me your body. No exceptions. No excuses.",cta:'UNDERSTOOD →'},
  {icon:null,title:'Phase 1 — Restore.',body:"Everyone starts here. No exceptions. We fix your foundation first. Rushing to Phase 3 is how people get hurt.",cta:'MAKES SENSE →'},
  {icon:'📋',title:'Daily Non-Negotiables.',body:'50 Push-ups · 10 Chin-ups · 10 Pull-ups\n25 Sit-ups · 25 Crunches · 25 V-Sits\n25 Side Planks each side\n50 Calf Raises · 50 Squats\n\nEvery. Single. Day.',cta:"I'LL DO IT →",highlight:true},
  {icon:'🏆',title:'Earn everything.',body:"Phase 2 earned. Phase 3 earned. Top 5 leaderboard each month earn a free HBHM compression shirt.",cta:"LET'S BUILD →"},
];

function WelcomeScreen({setScreen}){
  const [slide,setSlide]=useState(0);
  const cur=SLIDES[slide];
  const next=()=>slide===SLIDES.length-1?setScreen(S.ON1):setSlide(s=>s+1);
  return h('div',{style:{minHeight:'100vh',background:C.navy,display:'flex',flexDirection:'column',padding:'60px 28px 40px'}},
    h('div',{style:{display:'flex',gap:6,marginBottom:40,justifyContent:'center'}},
      SLIDES.map((_,i)=>h('div',{key:i,style:{height:4,borderRadius:2,transition:'all 0.3s',width:i===slide?24:8,background:i===slide?C.blue:i<slide?C.silverDim:C.border}}))
    ),
    h('div',{style:{display:'flex',justifyContent:'center',marginBottom:28}},
      h('div',{style:{width:100,height:100,borderRadius:'50%',background:'linear-gradient(135deg,#141B26,#1C2535)',border:`2px solid ${C.blue}40`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 40px ${C.blue}20`,animation:'pulse 2s ease-in-out infinite'}},
        cur.icon?h('span',{style:{fontSize:44}},cur.icon):h(Logo,{size:68})
      )
    ),
    h('div',{style:{flex:1}},
      h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:12,textAlign:'center'}},'COACH SKELLY'),
      h('div',{style:{fontSize:24,fontWeight:900,color:C.silverBright,lineHeight:1.2,marginBottom:20,textAlign:'center'}},cur.title),
      h('div',{style:{background:cur.highlight?`${C.blue}10`:C.navyLight,border:`1px solid ${cur.highlight?C.blue+'40':C.border}`,borderRadius:16,padding:20}},
        h('div',{style:{fontSize:14,color:C.silver,lineHeight:1.9,whiteSpace:'pre-line',textAlign:cur.highlight?'center':'left'}},cur.body)
      )
    ),
    h('button',{onClick:next,className:'btn',style:{width:'100%',marginTop:24,padding:'17px 0',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:14,color:'#fff',fontSize:15,fontWeight:800}},cur.cta),
    h('div',{style:{textAlign:'center',marginTop:10,fontSize:11,color:C.silverDim}},`${slide+1} of ${SLIDES.length}`)
  );
}

function DashScreen({setScreen,user,profile}){
  const NONNEG=[
    {id:'pushups',label:'Push-ups',target:50,unit:'reps'},
    {id:'chinups',label:'Chin-ups',target:10,unit:'reps'},
    {id:'pullups',label:'Pull-ups',target:10,unit:'reps'},
    {id:'situps',label:'Sit-ups',target:25,unit:'reps'},
    {id:'crunches',label:'Crunches',target:25,unit:'reps'},
    {id:'vsits',label:'V-Sits',target:25,unit:'reps'},
    {id:'sideplanks',label:'Side Planks',target:25,unit:'each side'},
    {id:'calfraises',label:'Calf Raises',target:50,unit:'reps'},
    {id:'squats',label:'Squats',target:50,unit:'reps'},
  ];
  const [checked,setChecked]=useState({});
  const toggle=id=>setChecked(c=>({...c,[id]:!c[id]}));
  const done=Object.values(checked).filter(Boolean).length;
  const all=done===NONNEG.length;
  const first=profile?.full_name?.split(' ')[0]?.toUpperCase()||user?.email?.split('@')[0]?.toUpperCase()||'ATHLETE';

  return h('div',{style:{minHeight:'100vh',background:C.navy,paddingBottom:100}},
    h('div',{style:{padding:'54px 24px 20px',background:`linear-gradient(180deg,${C.navyMid},${C.navy})`}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        h('div',null,
          h('div',{style:{fontSize:13,color:C.silverDim,fontWeight:600}},'Good morning,'),
          h('div',{style:{fontSize:28,fontWeight:900,color:C.silverBright,letterSpacing:1}},first),
          h('div',{style:{marginTop:6}},h(PhaseTag,{phase:profile?.phase||1}))
        ),
        h('div',{style:{position:'relative'}},
          h(Avatar,{size:64}),
          h('div',{style:{position:'absolute',bottom:-4,right:-4,background:all?C.success:C.warning,borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:800,border:`2px solid ${C.navy}`}},all?'✓':done)
        )
      )
    ),
    h('div',{style:{padding:'0 24px'}},
      h('div',{style:{display:'flex',gap:12,marginBottom:20}},
        h('div',{style:{flex:1,background:`${C.blue}10`,border:`1px solid ${C.blue}30`,borderRadius:16,padding:'14px 16px'}},h('div',{style:{fontSize:32}},'🔥'),h('div',{style:{fontSize:24,fontWeight:900,color:C.white}},profile?.streak||0),h('div',{style:{fontSize:11,color:C.silverDim}},'day streak')),
        h('div',{style:{flex:1,background:`${C.warning}10`,border:`1px solid ${C.warning}30`,borderRadius:16,padding:'14px 16px'}},h('div',{style:{fontSize:32}},'🏆'),h('div',{style:{fontSize:18,fontWeight:900,color:C.white}},profile?.points||0),h('div',{style:{fontSize:11,color:C.silverDim}},'points')),
        h('div',{style:{flex:1,background:`${C.success}10`,border:`1px solid ${C.success}30`,borderRadius:16,padding:'14px 16px',cursor:'pointer'}},h('div',{style:{fontSize:32}},'⌚'),h('div',{style:{fontSize:12,fontWeight:800,color:C.success}},'Watch'),h('div',{style:{fontSize:11,color:C.silverDim}},'Connect'))
      ),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('div',{style:{fontSize:12,color:C.silverDim,fontWeight:700,letterSpacing:1.5}},'DAILY NON-NEGOTIABLES'),
        h('div',{style:{fontSize:11,fontWeight:700,color:all?C.success:C.silver}},`${done}/${NONNEG.length}`)
      ),
      h('div',{style:{height:4,background:C.border,borderRadius:2,marginBottom:12,overflow:'hidden'}},
        h('div',{style:{height:'100%',borderRadius:2,background:all?C.success:C.blue,width:`${(done/NONNEG.length)*100}%`,transition:'width 0.3s'}})
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:20}},
        NONNEG.map(item=>{
          const d=!!checked[item.id];
          return h('button',{key:item.id,onClick:()=>toggle(item.id),className:'btn',style:{background:d?`${C.success}12`:C.navyLight,border:`1.5px solid ${d?C.success+'60':C.border}`,borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left',width:'100%'}},
            h('div',{style:{width:28,height:28,borderRadius:'50%',flexShrink:0,background:d?C.success:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:800}},d?'✓':''),
            h('div',{style:{flex:1}},h('span',{style:{fontSize:14,fontWeight:700,color:d?C.silverDim:C.silverBright,textDecoration:d?'line-through':'none'}},item.label)),
            h('div',{style:{fontSize:13,fontWeight:800,color:d?C.success:C.silver}},item.target,' ',h('span',{style:{fontSize:10,color:C.silverDim}},item.unit))
          );
        })
      ),
      all&&h('div',{style:{background:`${C.success}15`,border:`1px solid ${C.success}40`,borderRadius:14,padding:'14px 16px',marginBottom:20,display:'flex',gap:12,alignItems:'center'}},
        h('div',{style:{fontSize:28}},'💪'),
        h('div',null,h('div',{style:{fontSize:13,fontWeight:800,color:C.success}},'Non-negotiables done!'),h('div',{style:{fontSize:12,color:C.silverDim}},'Coach Skelly approves. Now hit your workout.'))
      ),
      h('div',{style:{background:C.navyLight,borderRadius:16,padding:16,border:`1px solid ${C.border}`,display:'flex',gap:12}},
        h(Avatar,{size:40}),
        h('div',null,
          h('div',{style:{fontSize:12,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:4}},'COACH SKELLY'),
          h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},all?'Non-negotiables done. Discipline. Now hit your workout.':`${NONNEG.length-done} non-negotiables left. No excuses.`),
          h('div',{style:{display:'flex',gap:8,marginTop:10}},
            h('button',{onClick:()=>setScreen(S.WORKOUT),className:'btn',style:{background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:8,padding:'7px 14px',color:'#fff',fontSize:12,fontWeight:700}},'WORKOUT'),
            h('button',{onClick:()=>setScreen(S.COACH),className:'btn',style:{background:'none',border:`1px solid ${C.blue}`,borderRadius:8,padding:'7px 14px',color:C.blue,fontSize:12,fontWeight:700}},'COACH')
          )
        )
      )
    ),
    h(BottomNav,{screen:S.DASH,setScreen})
  );
}

function CoachScreen({setScreen}){
  const [msgs,setMsgs]=useState([{role:'coach',text:"Welcome to Phase 1. Your joints, tendons, movement patterns — we fix these FIRST. Every day: 50 push-ups, 10 chin-ups, 10 pull-ups, 25 sit-ups, 25 crunches, 25 V-sits, 25 side planks each side, 50 calf raises, 50 squats. Non-negotiable. Ask me anything."}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  
  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput('');
    setMsgs(m=>[...m,{role:'user',text:msg}]);setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:"You are Coach Skelly, AI fitness coach for HBHM. Direct, science-backed, zero excuses. Phase 1 Restore, Phase 2 Condition, Phase 3 Strengthen. Everyone starts Phase 1. Daily non-negotiables: 50 push-ups, 10 chin-ups, 10 pull-ups, 25 sit-ups, 25 crunches, 25 V-sits, 25 side planks each side, 50 calf raises, 50 squats. $5/week no free trial. 3-5 sentences max.",messages:[...msgs.map(m=>({role:m.role==='coach'?'assistant':'user',content:m.text})),{role:'user',content:msg}]})});
      const data=await res.json();
      setMsgs(m=>[...m,{role:'coach',text:data.content?.[0]?.text||'Stay focused.'}]);
    }catch{setMsgs(m=>[...m,{role:'coach',text:'Connection issue. No excuses on the workout.'}]);}
    setLoading(false);
  };

  return h('div',{style:{minHeight:'100vh',background:C.navy,display:'flex',flexDirection:'column',paddingBottom:140}},
    h('div',{style:{padding:'54px 24px 16px',background:C.navyMid,borderBottom:`1px solid ${C.navyLight}`,display:'flex',alignItems:'center',gap:14}},
      h(Avatar,{size:48,animate:true}),
      h('div',null,h('div',{style:{fontSize:16,fontWeight:800,color:C.silverBright}},'Coach Skelly'),h('div',{style:{fontSize:11,color:C.success}},'● Online')),
      h('div',{style:{marginLeft:'auto'}},h(PhaseTag,{phase:1}))
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:14}},
      msgs.map((m,i)=>h('div',{key:i,style:{display:'flex',gap:10,flexDirection:m.role==='user'?'row-reverse':'row'}},
        m.role==='coach'&&h(Avatar,{size:32}),
        h('div',{style:{maxWidth:'78%',padding:'12px 16px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',background:m.role==='user'?'linear-gradient(135deg,#1D4ED8,#3B82F6)':C.navyLight,fontSize:14,color:C.silverBright,lineHeight:1.6}},m.text)
      )),
      loading&&h('div',{style:{display:'flex',gap:10}},
        h(Avatar,{size:32}),
        h('div',{style:{background:C.navyLight,borderRadius:'18px 18px 18px 4px',padding:'12px 16px'}},
          h('div',{style:{display:'flex',gap:4}},[0,1,2].map(i=>h('div',{key:i,style:{width:6,height:6,borderRadius:'50%',background:C.silverDim,animation:`bounce 1s ${i*0.2}s ease-in-out infinite`}})))
        )
      )
    ),
    h('div',{style:{position:'fixed',bottom:70,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,padding:'12px 16px',background:C.navy,borderTop:`1px solid ${C.navyLight}`,display:'flex',gap:10}},
      h('input',{value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(),placeholder:'Ask Coach Skelly anything...',style:{flex:1,padding:'12px 16px',borderRadius:24,fontSize:14,background:C.navyLight,border:`1.5px solid ${C.border}`,color:C.silverBright,outline:'none'}}),
      h('button',{onClick:send,className:'btn',style:{width:46,height:46,borderRadius:'50%',background:input.trim()?'linear-gradient(135deg,#1D4ED8,#3B82F6)':C.border,fontSize:18,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}},'→')
    ),
    h(BottomNav,{screen:S.COACH,setScreen})
  );
}

const WORKOUTS=[

function ExerciseScreen({setScreen,exercise}){
  const [started,setStarted]=useState(false);

  const [reps,setReps]=useState(0);
  useEffect(()=>{if(!started)return;const i=setInterval(()=>setTimer(t=>t+1),1000);return()=>clearInterval(i);},[started]);
  if(!exercise)return null;
  const mm=String(Math.floor(timer/60)).padStart(2,'0');
  const ss=String(timer%60).padStart(2,'0');
  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 40px'}},
    h('button',{onClick:()=>setScreen(S.WORKOUT),className:'btn',style:{background:'none',color:C.blue,fontSize:13,fontWeight:700,marginBottom:20,padding:0}},'← Back'),
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:6}},'COACH SKELLY'),
    h('div',{style:{fontSize:24,fontWeight:900,color:C.silverBright,marginBottom:4}},exercise.name),
    h('div',{style:{fontSize:13,color:C.silverDim,marginBottom:20}},exercise.sets),
    h('div',{style:{background:C.navyLight,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginBottom:12}},
      h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:1.5,marginBottom:14}},'MUSCLES WORKED'),
      h('div',{style:{marginBottom:12}},
        h('div',{style:{fontSize:11,color:C.success,fontWeight:700,letterSpacing:1,marginBottom:8}},'PRIMARY'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},exercise.primary.map(x=>h('span',{key:x,style:{background:`${C.success}15`,border:`1px solid ${C.success}40`,borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600,color:C.success}},x)))
      ),
      h('div',null,
        h('div',{style:{fontSize:11,color:C.silverDim,fontWeight:700,letterSpacing:1,marginBottom:8}},'SECONDARY'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},exercise.secondary.map(x=>h('span',{key:x,style:{background:C.border,borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600,color:C.silverDim}},x)))
      )
    ),
    h('div',{style:{background:`${C.warning}10`,border:`1px solid ${C.warning}30`,borderRadius:14,padding:16,marginBottom:16,display:'flex',gap:12}},
      h('span',{style:{fontSize:20}},'💡'),
      h('div',null,h('div',{style:{fontSize:11,color:C.warning,fontWeight:700,letterSpacing:1,marginBottom:4}},'FORM TIP'),h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},exercise.tip))
    ),
    h('div',{style:{background:`${C.blue}10`,border:`1px solid ${C.blue}30`,borderRadius:14,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12}},
      h('div',{style:{width:36,height:36,borderRadius:10,background:`${C.blue}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},'💀'),
      h('div',null,h('div',{style:{fontSize:13,fontWeight:700,color:C.silverBright}},'Coach Skelly Demo'),h('div',{style:{fontSize:11,color:C.blue}},'Animation coming soon'))
    ),
    h('div',{style:{display:'flex',gap:12,marginBottom:16}},
      h('div',{style:{flex:1,background:C.navyLight,borderRadius:14,padding:16,textAlign:'center',border:`1px solid ${C.border}`}},h('div',{style:{fontSize:28,fontWeight:900,color:C.white}},`${mm}:${ss}`),h('div',{style:{fontSize:11,color:C.silverDim,marginTop:4}},'TIMER')),
      h('div',{style:{flex:1,background:C.navyLight,borderRadius:14,padding:16,textAlign:'center',border:`1px solid ${C.border}`}},
        h('div',{style:{fontSize:28,fontWeight:900,color:C.blue}},reps),
        h('div',{style:{fontSize:11,color:C.silverDim,marginTop:4}},'REPS'),

          h('button',{onClick:()=>setReps(r=>r+1),className:'btn',style:{width:28,height:28,borderRadius:'50%',background:C.blue,color:'#fff',fontSize:16,fontWeight:700}},'+')
        )
      )
    ),
    h('button',{onClick:()=>setStarted(s=>!s),className:'btn',style:{width:'100%',padding:'16px 0',background:started?`${C.warning}30`:'linear-gradient(135deg,#1D4ED8,#3B82F6)',border:`1px solid ${started?C.warning:'transparent'}`,borderRadius:14,color:started?C.warning:'#fff',fontSize:15,fontWeight:800}},started?'⏸ PAUSE':'▶ START SET'),

function NutritionScreen({setScreen}){

  return h('div',{style:{minHeight:'100vh',background:C.navy,padding:'54px 24px 100px'}},
    h('div',{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:4}},'NUTRITION LOG'),
    h('div',{style:{fontSize:26,fontWeight:900,color:C.silverBright,marginBottom:20}},"Today's Fuel"),
    h('div',{style:{background:C.navyLight,borderRadius:20,padding:20,display:'flex',alignItems:'center',gap:20,marginBottom:24}},
      h('div',{style:{position:'relative',width:80,height:80,flexShrink:0}},
        h('svg',{width:'80',height:'80',viewBox:'0 0 80 80'},
          h('circle',{cx:'40',cy:'40',r:'34',fill:'none',stroke:C.border,strokeWidth:'8'}),
          h('circle',{cx:'40',cy:'40',r:'34',fill:'none',stroke:C.blue,strokeWidth:'8',strokeDasharray:`${2*Math.PI*34*pct/100} ${2*Math.PI*34}`,strokeLinecap:'round',transform:'rotate(-90 40 40)'})
        ),
        h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}},h('div',{style:{fontSize:16,fontWeight:900,color:C.white}},`${pct}%`))
      ),

    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:20}},
      meals.map((m,i)=>h('div',{key:i,style:{background:C.navyLight,borderRadius:14,padding:'14px 16px',border:`1px solid ${m.logged?C.border:C.warning+'30'}`}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:m.logged?4:0}},
          h('span',{style:{fontSize:14,fontWeight:700,color:C.silverBright}},m.name),
          m.logged?h('span',{style:{fontSize:14,fontWeight:800,color:C.white}},`${m.cal} kcal`):h('button',{className:'btn',style:{background:`${C.warning}20`,border:`1px solid ${C.warning}50`,borderRadius:8,padding:'5px 12px',color:C.warning,fontSize:11,fontWeight:700}},'📸 Log Meal')
        ),
        m.logged&&h('div',{style:{fontSize:12,color:C.silverDim}},`${m.time} · ${m.items}`)

    h('div',{style:{background:`${C.blue}10`,border:`1px solid ${C.blue}30`,borderRadius:14,padding:16,display:'flex',gap:12}},
      h(Avatar,{size:36}),
      h('div',{style:{fontSize:13,color:C.silver,lineHeight:1.6}},`"You're at ${pct}% of your calories. Log dinner and stay within 400 more. Protein first, always."`)
    ),
    h(BottomNav,{screen:S.NUTRITION,setScreen})
  );
}

function App(){
  const [screen,setScreen]=useState(S.LOADING);
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [ex,setEx]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadProfile(session.user.id);setScreen(S.DASH);}
      else setScreen(S.AUTH);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user){setUser(session.user);loadProfile(session.user.id);}
      else{setUser(null);setProfile(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const loadProfile=async(id)=>{const{data}=await sb.from('profiles').select('*').eq('id',id).single();if(data)setProfile(data);};

  const render=()=>{
    switch(screen){
      case S.LOADING:return h('div',{style:{minHeight:'100vh',background:C.navy,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}},h(Logo,{size:80,animate:true}),h('div',{style:{fontSize:11,color:C.silverDim,letterSpacing:3}},'LOADING...'));
      case S.AUTH:return h(AuthScreen,{setScreen,setUser});
      case S.WELCOME:return h(WelcomeScreen,{setScreen});
      case S.ON1:case S.ON2:case S.ONBODY:case S.ON3:case S.PAYMENT:return h('div',{style:{minHeight:'100vh',background:C.navy,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,gap:24}},h(Logo,{size:80,animate:true}),h('button',{onClick:()=>setScreen(S.DASH),className:'btn',style:{padding:'16px 40px',background:'linear-gradient(135deg,#1D4ED8,#3B82F6)',borderRadius:14,color:'#fff',fontSize:15,fontWeight:800}},'ENTER HBHM →'));
      case S.DASH:return h(DashScreen,{setScreen,user,profile});
      case S.WORKOUT:return h(WorkoutScreen,{setScreen,setEx});
      case S.EXERCISE:return h(ExerciseScreen,{setScreen,exercise:ex});
      case S.COACH:return h(CoachScreen,{setScreen});
      case S.NUTRITION:return h(NutritionScreen,{setScreen});
      case S.LEADERBOARD:return h(LeaderboardScreen,{setScreen});
      default:return null;
    }
  };

  return h('div',{style:{maxWidth:430,margin:'0 auto',minHeight:'100vh',background:C.navy,fontFamily:"'Inter',-apple-system,sans-serif"}},render());
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
